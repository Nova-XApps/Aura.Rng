<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA CLICKER RNG – EXPANDED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
:root{
  --gold:#f5c842;--purple:#9b6eff;--cyan:#00e5ff;--pink:#ff6fd8;--red:#ff4444;
  --bg:#0a0a12;--bg2:#111120;--bg3:#181830;--border:#2a2a4a;
  --text:#e8e8ff;--muted:#7070a0;
}
html,body{min-height:100vh;background:var(--bg);}
body{font-family:'Inter',sans-serif;color:var(--text);padding:10px;position:relative;overflow-x:hidden;}

#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
#game{position:relative;z-index:1;max-width:1300px;margin:0 auto;}

#topbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:14px;padding:10px 14px;align-items:center;backdrop-filter:blur(8px);}
.stat-pill{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;white-space:nowrap;}
.stat-pill span{color:var(--gold);}
#title-badge{font-family:'Cinzel',serif;font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--gold),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;margin-left:auto;}

#main{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:1100px){#main{grid-template-columns:1fr 1fr 1fr;}}
@media(max-width:800px){#main{grid-template-columns:1fr 1fr;}}
@media(max-width:550px){#main{grid-template-columns:1fr;}}

.panel{background:rgba(17,17,32,0.92);border:1px solid var(--border);border-radius:18px;padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(6px);}
.panel:hover{border-color:#3a3a6a;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;border-left:3px solid var(--purple);padding-left:8px;}

#big-orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c084fc,#6d28d9,#1e1040);border:3px solid var(--purple);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:42px;transition:transform 0.08s;box-shadow:0 0 35px #6d28d960,inset 0 0 20px rgba(255,255,255,0.1);position:relative;margin:0 auto;}
#big-orb:hover{filter:brightness(1.15);}
#big-orb:active{transform:scale(0.91);}
#orb-ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;border-top-color:var(--cyan);border-right-color:rgba(0,229,255,0.3);animation:spin 3s linear infinite;}
#orb-ring2{position:absolute;inset:-14px;border-radius:50%;border:1px solid transparent;border-bottom-color:var(--pink);border-left-color:rgba(255,111,216,0.3);animation:spin 5s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}

#energy-bar-wrap{width:100%;margin:10px 0;}
#aura-energy-bar{width:100%;height:10px;background:#0d0d1a;border-radius:5px;overflow:hidden;border:1px solid var(--border);}
#aura-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:5px;transition:width 0.12s;width:0%;}
#energy-label{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--muted);}

#roll-btn{background:linear-gradient(135deg,#6d28d9,#9b6eff);border:none;color:#fff;font-weight:700;padding:10px 28px;border-radius:22px;cursor:pointer;font-size:14px;letter-spacing:1.5px;transition:0.12s;box-shadow:0 4px 18px #6d28d966;font-family:'Inter',sans-serif;}
#roll-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 6px 25px #9b6effaa;}
#roll-btn:active:not(:disabled){transform:scale(0.95);}
#roll-btn:disabled{opacity:0.4;cursor:not-allowed;}

.mbtn{background:rgba(109,40,217,0.15);border:1px solid #6d28d9;color:#c4b5fd;font-size:11px;padding:5px 12px;border-radius:16px;cursor:pointer;transition:0.12s;font-family:'Inter',sans-serif;}
.mbtn:hover:not(:disabled){background:rgba(109,40,217,0.3);border-color:var(--purple);}
.mbtn:active{transform:scale(0.96);}
.mbtn:disabled{opacity:0.4;cursor:not-allowed;}
.mbtn.danger{border-color:#7f1d1d;color:#fca5a5;background:rgba(255,50,50,0.08);}
.mbtn.gold{border-color:#92400e;color:var(--gold);background:rgba(245,200,66,0.08);}

#inv-scroll{max-height:200px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;}
.inv-item{background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:10px;padding:7px;cursor:pointer;transition:0.12s;display:flex;justify-content:space-between;align-items:center;}
.inv-item:hover{border-color:var(--purple);}
.inv-item.equipped{border-color:var(--gold);}
.inv-item .iname{font-weight:600;font-size:11px;}

#log-box{background:rgba(0,0,0,0.4);border-radius:10px;padding:8px;height:100px;overflow-y:auto;font-size:10px;color:var(--muted);margin-top:8px;border:1px solid var(--border);}

#result-panel{background:rgba(0,0,0,0.4);border-radius:12px;padding:12px;border-left:4px solid var(--purple);margin-top:2px;}

.click-particle{position:fixed;pointer-events:none;z-index:9999;font-size:14px;font-weight:700;animation:floatUp 0.9s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-65px) scale(0.5);}}

#cutscene{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:10000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
#cutscene.show{display:flex;}
#cs-phase{font-family:'Cinzel',serif;font-size:32px;font-weight:700;text-align:center;letter-spacing:4px;text-transform:uppercase;max-width:80%;}
#cs-bar{width:320px;height:4px;background:#222;border-radius:2px;overflow:hidden;}
#cs-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));width:0%;transition:width 0.7s;}

@keyframes shake{0%{transform:translate(2px,1px);}25%{transform:translate(-2px,-1px);}50%{transform:translate(1px,2px);}75%{transform:translate(-1px,-2px);}100%{transform:translate(0,0);}}
.shaking{animation:shake 0.07s infinite;}
@keyframes glitch{0%,100%{transform:none;}20%{transform:translate(-3px,1px)skewX(2deg);}40%{transform:translate(3px,-1px)skewX(-2deg);}60%{transform:translate(-2px,2px);}80%{transform:translate(2px,-2px)skewX(1deg);}}
.glitching{animation:glitch 0.1s infinite;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="toast" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,40,0.95);border:1px solid var(--purple);border-radius:12px;padding:10px 24px;font-size:13px;color:var(--text);z-index:9000;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;"></div>

<div id="game">
  <div id="topbar">
    <div class="stat-pill">⚡ Energy <span id="hud-energy">0</span></div>
    <div class="stat-pill">🎲 Rolls <span id="hud-rolls">0</span></div>
    <div class="stat-pill">🌀 Prestige <span id="hud-prestige">1.00x</span></div>
    <div class="stat-pill">🍀 Sac <span id="hud-sac">0</span></div>
    <div class="stat-pill">🔥 Streak <span id="hud-streak">0</span></div>

  <div id="main">
    <!-- CLICKER PANEL -->
    <div class="panel">
      <div class="panel-title">✦ Aura Orb</div>
      <div id="clicker-area" style="text-align:center;">
        <div id="big-orb"><div id="orb-ring"></div><div id="orb-ring2"></div><span id="orb-emoji">🔮</span></div>
        <div id="click-counter" style="font-size:24px;font-weight:700;color:var(--gold);">0</div>
        <div id="click-rate" style="font-size:11px;color:var(--muted);">+1 / click</div>
        <div id="energy-bar-wrap">
          <div id="aura-energy-bar"><div id="aura-fill"></div></div>
          <div id="energy-label"><span>Energy</span><span id="energy-val">0 / 100</span></div>
        </div>
        <button id="roll-btn">⚡ ROLL AURA</button>
        <div id="roll-cost" style="font-size:10px;color:var(--muted);">Cost: <span id="cost-val">100</span></div>
        <div id="result-panel"></div>
        <div id="sacrifice-meter" style="margin-top:10px;font-size:10px;color:var(--muted);"></div>
      </div>
    </div>

    <!-- INVENTORY & EQUIPPED -->
    <div class="panel">
      <div class="panel-title">⚡ Equipped Aura</div>
      <div id="equipped-box" style="background:rgba(0,0,0,0.5);border-radius:12px;padding:12px;margin-bottom:12px;">
        <div id="eq-name" class="t1">None</div>
        <div id="eq-effect" style="font-size:11px;color:var(--muted);">No effect</div>
        <div id="eq-abilities" style="font-size:11px;color:#57c8ff;"></div>
      </div>
      <div class="panel-title">🎒 Inventory</div>
      <div id="inv-scroll"></div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;">
        <button class="mbtn" id="equip-best">🏆 Best</button>
        <button class="mbtn gold" id="fusion-btn">✨ Fuse 2</button>
        <button class="mbtn danger" id="sacrifice-selected">🩸 Sacrifice</button>
        <button class="mbtn" id="sort-btn">⬇ Sort</button>
        <button class="mbtn danger" id="clear-inv">🗑️ Clear</button>
      </div>
      <div id="log-box"></div>
    </div>

    <!-- PETS & BOSSES -->
    <div class="panel">
      <div class="panel-title">🐾 Pet</div>
      <div id="pet-area" style="font-size:11px;margin-bottom:12px;"></div>
      <div class="panel-title">👾 Boss</div>
      <div id="boss-area" style="font-size:11px;"></div>
      <div class="panel-title">🗺️ Biome</div>
      <select id="biome-select" style="background:#111;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px;width:100%;margin-top:8px;"></select>
    </div>

    <!-- SHOP & PRESTIGE & STATS -->
    <div class="panel">
      <div class="panel-title">🛒 Shop</div>
      <div id="shop-list" style="max-height:300px;overflow-y:auto;"></div>
      <div style="margin-top:12px;">
        <div class="panel-title">🌀 Prestige</div>
        <button class="mbtn gold" id="prestige-btn" style="width:100%;">🌀 Prestige Reset</button>
        <button class="mbtn" id="genesis-btn" style="width:100%;margin-top:5px;display:none;">💠 Genesis Reset (T18+)</button>
      </div>
      <div class="panel-title" style="margin-top:12px;">📊 Stats</div>
      <div id="stats-box" style="font-size:10px;color:var(--muted);"></div>
    </div>
  </div>
</div>

<div id="cutscene"><div id="cs-phase"></div><div id="cs-name" style="color:var(--muted);"></div><div id="cs-bar"><div id="cs-bar-fill"></div></div></div>

<script>
// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
const G = {
  energy: 0,
  totalRolls: 0,
  manualRolls: 0,
  prestigeBonus: 1.0,
  clickPower: 1,
  clickPowerMult: 1.0,
  rollCost: 100,
  inventory: [],
  equippedAura: null,
  currentRolled: null,
  pityCounter: 0,
  pityThreshold: 60,
  streak: 0,
  bestTier: 0,
  sacrifices: 0,
  sacrificeLuck: 0,
  sacrificeCharge: 0,
  sacrificePityBoost: 0,
  pets: [],
  activePet: null,
  bosses: [],
  currentBoss: null,
  biome: 'plains',
  unlockedBiomes: ['plains'],
  autoClickInterval: null,
  autoRollUnlocked: false,
  autoFusionUnlocked: false,
  offlineTimestamp: Date.now(),
  upgrades: { clickPower:0, rollCost:0, energyMult:0, luck:0, autoClick:0, autoRoll:0, autoFusion:0 },
  stats: {}
};

// ═══════════════════════════════════════════════
// DATA: 20 TIERS
// ═══════════════════════════════════════════════
const TIER_NAMES  = ['','Common','Uncommon','Advanced','Rare','Super Rare','Epic','Mythic','Legendary','Ancient','Celestial','Divine','Cosmic','Voidborn','Reality-Breaker','Timeworn','Galaxy Emperor','Infinity','Genesis','Omega','Apex Eternal'];
const TIER_EMOJIS = ['','⚪','🔵','🟢','🟠','🟣','⭐','💫','🌌','🕳️','💥','✨','🌀','♾️','⚠️','⌛','👑','∞','🔮','💀','🔥'];
const TIER_COLORS = ['','#aaa','#57c8ff','#7fff5e','#ff9f43','#e040fb','#f5c842','#ff6fd8','#00e5ff','#ff4444','#ff00ff','#9b6eff','#00ffff','#ff88ff','#ff2222','#ffbb00','#ffffff','#7700ff','#ff00dd','#000000','#ff0000'];
const TIER_ODDS   = {1:0.32,2:0.18,3:0.14,4:0.10,5:0.08,6:0.06,7:0.04,8:0.03,9:0.02,10:0.015,11:0.008,12:0.004,13:0.002,14:0.001,15:0.0006,16:0.0003,17:0.00015,18:0.00008,19:0.00004,20:0.00002};

// ═══════════════════════════════════════════════
// PROCEDURAL AURA GENERATION
// ═══════════════════════════════════════════════
const ARCHETYPES = ['Flame','Frost','Storm','Void','Light','Earth','Time','Cosmic','Glitch','Blood'];
const MODIFIERS = ['Corrupted','Enhanced','Prime','Fragmented','Eternal','Ascended','Broken','Infinite'];

function generateAllAuras() {
  const auras = [];
  const usedNames = new Set();
  const distribution = {}; // tier -> count
  for(let t=1; t<=10; t++) distribution[t]=10;
  for(let t=11; t<=15; t++) distribution[t]=8;
  for(let t=16; t<=20; t++) distribution[t]=12;

  const archetypeCombos = [];
  for(let a of ARCHETYPES) for(let b of ARCHETYPES) archetypeCombos.push([a,b]);

  for(let tier=1; tier<=20; tier++) {
    const needed = distribution[tier];
    let added = 0;
    while(added < needed) {
      const combo = archetypeCombos[Math.floor(Math.random()*archetypeCombos.length)];
      const mod = MODIFIERS[Math.floor(Math.random()*MODIFIERS.length)];
      const name = `${combo[0]} ${combo[1]} ${mod}`;
      if(usedNames.has(name)) continue;
      usedNames.add(name);
      const aura = {
        id: `gen-${tier}-${added}`,
        name,
        tier,
        archetype: combo[0],
        secondary: combo[1],
        modifier: mod,
        mult: 1.2 + (tier*0.2),
        effect: combo[0].toLowerCase(), // visual effect mapping
        passive: generatePassive(tier, combo),
        abilities: generateAbilities(tier, combo)
      };
      auras.push(aura);
      added++;
    }
  }
  return auras;
}

function generatePassive(tier, combo) {
  const base = `+${Math.floor(tier*3)}% energy gain`;
  return base;
}

function generateAbilities(tier, combo) {
  const pool = ['energyBoost','clickPower','luckBoost','rollCostReduction','bossDamage','autoClickSpeed','pityManipulation','fusionBonus','biomeSynergy'];
  const count = tier <= 9 ? 1 : (tier <=15 ? 2 : 3);
  const selected = [];
  for(let i=0; i<count; i++) {
    const ab = pool[Math.floor(Math.random()*pool.length)];
    selected.push({ type: ab, value: Math.floor(tier*1.5) });
  }
  return selected;
}

const AURA_DB = generateAllAuras();

// ═══════════════════════════════════════════════
// SCREEN EFFECTS (archetype mapping)
// ═══════════════════════════════════════════════
const EFFECTS = {
  flame:(ctx,W,H,t)=>{for(let i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*3+1,0,6.28);ctx.fillStyle=`rgba(255,${100+Math.random()*100},0,0.3)`;ctx.fill();}},
  frost:(ctx,W,H,t)=>{ctx.strokeStyle='rgba(160,225,255,0.25)';ctx.lineWidth=1;for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(Math.random()*W,Math.random()*H);ctx.lineTo(Math.random()*W,Math.random()*H);ctx.stroke();}},
  storm:(ctx,W,H,t)=>{let g=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,Math.max(W,H)*0.6);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(80,100,255,0.2)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);},
  void:(ctx,W,H,t)=>{let g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,220);g.addColorStop(0,'rgba(80,0,160,0.18)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);},
  light:(ctx,W,H,t)=>{for(let i=0;i<7;i++){let x=50+i*(W/7);let h=80+Math.sin(t*0.002+i)*40;ctx.fillStyle=`rgba(255,240,180,0.1)`;ctx.fillRect(x-10,0,20,h);}},
  earth:(ctx,W,H,t)=>{for(let i=0;i<6;i++){let a=i/6*Math.PI*2+t*0.0005;let r=180+Math.sin(t*0.002)*30;ctx.beginPath();ctx.arc(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r,8,0,6.28);ctx.fillStyle='rgba(139,100,60,0.3)';ctx.fill();}},
  time:(ctx,W,H,t)=>{for(let i=0;i<6;i++){let a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(a+t*0.001)*180,H/2+Math.sin(a+t*0.001)*120);ctx.strokeStyle='rgba(200,200,255,0.25)';ctx.lineWidth=1;ctx.stroke();}},
  cosmic:(ctx,W,H,t)=>{for(let i=0;i<20;i++){let x=(Math.sin(i*7.3+t*0.0006)*0.5+0.5)*W,y=(Math.cos(i*5.7+t*0.0007)*0.5+0.5)*H;ctx.beginPath();ctx.arc(x,y,1.5,0,6.28);ctx.fillStyle='rgba(255,255,200,0.65)';ctx.fill();}},
  glitch:(ctx,W,H,t)=>{if(Math.random()<0.05){ctx.fillStyle='rgba(255,0,0,0.04)';ctx.fillRect(0,Math.random()*H,W,2);}},
  blood:(ctx,W,H,t)=>{for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*4+1,0,6.28);ctx.fillStyle='rgba(200,0,30,0.25)';ctx.fill();}}
};

// ═══════════════════════════════════════════════
// BIOME SYSTEM
// ═══════════════════════════════════════════════
const BIOMES = {
  plains: { name:'Starter Plains', emoji:'🌱', unlock: ()=>true, weight:{}, bg:'#0a0a12' },
  volcano: { name:'Infernal Volcano', emoji:'🔥', unlock: ()=>G.totalRolls>=50, weight:{ Flame:1.5 }, bg:'#1a0a00' },
  frozen: { name:'Frozen Abyss', emoji:'❄️', unlock: ()=>G.totalRolls>=120, weight:{ Frost:1.5 }, bg:'#001a2e' },
  ocean: { name:'Ocean Depths', emoji:'🌊', unlock: ()=>G.totalRolls>=200, weight:{ Storm:1.5 }, bg:'#001a3a' },
  cosmicvoid: { name:'Cosmic Void', emoji:'🌌', unlock: ()=>G.totalRolls>=350, weight:{ Void:2, Cosmic:1.5 }, bg:'#05001a' },
  stormrealm: { name:'Storm Realm', emoji:'⚡', unlock: ()=>G.totalRolls>=500, weight:{ Storm:2 }, bg:'#1a1a3a' },
  glitch: { name:'Glitch Dimension', emoji:'🕳️', unlock: ()=>G.totalRolls>=800, weight:{ Glitch:2.5 }, bg:'#000' },
  galactic: { name:'Galactic Core', emoji:'🪐', unlock: ()=>G.prestigeBonus>=1.5, weight:{ Cosmic:2, Light:1.5 }, bg:'#000020' },
  infinite: { name:'Infinite Zone', emoji:'♾️', unlock: ()=>G.prestigeBonus>=2.5, weight:{ Time:2, Void:2 }, bg:'#100020' }
};

// ═══════════════════════════════════════════════
// PET SYSTEM
// ═══════════════════════════════════════════════
const BASE_PETS = [
  { id:'wisp', name:'Energy Wisp', rarity:'Common', emoji:'🔥', effect:{ energyBoost:0.1 } },
  { id:'frostpup', name:'Frost Pup', rarity:'Common', emoji:'🐺', effect:{ autoClickSpeed:0.05 } },
  { id:'luckycat', name:'Lucky Cat', rarity:'Rare', emoji:'🐱', effect:{ luckBoost:0.03 } },
  { id:'voidspirit', name:'Void Spirit', rarity:'Rare', emoji:'👻', effect:{ pityBoost:2 } },
  { id:'dragon', name:'Star Dragon', rarity:'Mythic', emoji:'🐉', effect:{ bossDamage:0.15, energyBoost:0.2 } },
  { id:'phoenix', name:'Phoenix', rarity:'Mythic', emoji:'🔥', effect:{ fusionBonus:0.1 } },
  { id:'nullcat', name:'Null Cat', rarity:'Secret', emoji:'😼', effect:{ sacrificeBoost:0.2, luckBoost:0.1 } }
];

// ═══════════════════════════════════════════════
// BOSS SYSTEM
// ═══════════════════════════════════════════════
const BOSS_LIST = [
  { name:'Slime Core', hp:200, reward:{ energy:100, petChance:0.1 } },
  { name:'Shadow Wisp', hp:500, reward:{ energy:200, petChance:0.15 } },
  { name:'Iron Colossus', hp:1200, reward:{ energy:400, auraTier:5 } },
  { name:'Flame Beast', hp:2500, reward:{ energy:700, petChance:0.2 } },
  { name:'Frost Titan', hp:5000, reward:{ energy:1000, biomeUnlock:'frozen' } },
  { name:'Void Stalker', hp:10000, reward:{ energy:2000, auraTier:8 } },
  { name:'Storm Leviathan', hp:20000, reward:{ energy:4000, petChance:0.3 } },
  { name:'Cosmic Serpent', hp:40000, reward:{ energy:8000, biomeUnlock:'cosmicvoid' } },
  { name:'Reality Phantom', hp:80000, reward:{ energy:15000, auraTier:12 } },
  { name:'✦ THE NULL KING ✦', hp:200000, reward:{ energy:50000, secretPet:true } }
];

// ═══════════════════════════════════════════════
// CORE FUNCTIONS
// ═══════════════════════════════════════════════
function rollAura() {
  let luck = G.sacrificeLuck + (G.upgrades.luck * 0.05) + (G.activePet?.effect?.luckBoost||0);
  let effectiveOdds = {...TIER_ODDS};
  // Apply biome weights
  const biome = BIOMES[G.biome];
  if(biome.weight) {
    for(let t=1; t<=20; t++) {
      const pool = AURA_DB.filter(a=>a.tier===t);
      let bonus = 1;
      for(let arch in biome.weight) {
        if(pool.some(a=>a.archetype===arch)) bonus += biome.weight[arch]-1;
      }
      effectiveOdds[t] *= bonus;
    }
  }
  let total = Object.values(effectiveOdds).reduce((a,b)=>a+b,0);
  let r = Math.random()*total, acc=0, sel=1;
  for(let t=20; t>=1; t--) {
    acc += effectiveOdds[t];
    if(r < acc) { sel=t; break; }
  }
  if(luck > 0 && Math.random() < luck*0.2) sel = Math.min(20, sel+2);
  const pityThreshold = Math.max(20, G.pityThreshold - G.sacrificePityBoost);
  if(G.pityCounter >= pityThreshold && sel < 5) sel = 5;
  if(sel >= 5) G.pityCounter = Math.floor(G.pityCounter/2);
  else G.pityCounter++;
  const pool = AURA_DB.filter(a=>a.tier===sel);
  const aura = pool.length ? pool[Math.floor(Math.random()*pool.length)] : AURA_DB[0];
  G.stats['t'+sel] = (G.stats['t'+sel]||0)+1;
  return {...aura};
}

function calculateDamage() {
  let base = G.clickPower * G.clickPowerMult * G.prestigeBonus;
  if(G.equippedAura) base *= G.equippedAura.mult;
  if(G.activePet?.effect?.energyBoost) base *= (1+G.activePet.effect.energyBoost);
  return base;
}

function applyAuraAbilities() {
  if(!G.equippedAura) return;
  const abis = G.equippedAura.abilities;
  for(let ab of abis) {
    switch(ab.type) {
      case 'energyBoost': G.clickPowerMult += 0.05; break;
      case 'clickPower': G.clickPower += Math.floor(ab.value/5); break;
      case 'luckBoost': G.sacrificeLuck += 0.01; break;
      case 'rollCostReduction': G.rollCost = Math.max(20, G.rollCost-2); break;
      case 'bossDamage': break; // handled in combat
      case 'autoClickSpeed': if(G.autoClickInterval) setupAutoClick(); break;
      case 'pityManipulation': G.pityCounter += 2; break;
      case 'fusionBonus': break;
    }
  }
}

// ═══════════════════════════════════════════════
// SACRIFICE
// ═══════════════════════════════════════════════
function sacrificeAura(index) {
  const aura = G.inventory[index];
  if(!aura) return;
  const tierBoost = aura.tier * 0.5;
  G.sacrifices++;
  G.sacrificeLuck = Math.min(3, G.sacrificeLuck + 0.02 * tierBoost);
  G.sacrificePityBoost = Math.min(40, G.sacrificePityBoost + Math.floor(tierBoost));
  G.sacrificeCharge += tierBoost;
  G.inventory.splice(index,1);
  if(G.equippedAura && G.equippedAura.id === aura.id) G.equippedAura = null;
  if(G.sacrificeCharge >= 100) {
    G.sacrificeCharge -= 100;
    G.energy += 200;
    showToast('Sacrifice Charge full! +200 energy');
  }
  addLog(`🩸 Sacrificed ${aura.name} (T${aura.tier})`);
  updateUI();
}

// ═══════════════════════════════════════════════
// BOSS FIGHT
// ═══════════════════════════════════════════════
function startBoss(index) {
  if(G.currentBoss) return;
  const boss = {...BOSS_LIST[index], currentHp: BOSS_LIST[index].hp};
  G.currentBoss = boss;
  addLog(`👾 Fighting ${boss.name}!`);
  const interval = setInterval(() => {
    if(!G.currentBoss) { clearInterval(interval); return; }
    const dmg = calculateDamage() * (1 + (G.activePet?.effect?.bossDamage||0));
    G.currentBoss.currentHp -= dmg;
    if(G.currentBoss.currentHp <= 0) {
      clearInterval(interval);
      const reward = boss.reward;
      G.energy += reward.energy || 0;
      if(reward.petChance && Math.random()<reward.petChance) obtainRandomPet();
      if(reward.auraTier) {
        const pool = AURA_DB.filter(a=>a.tier===reward.auraTier);
        if(pool.length) G.inventory.push({...pool[Math.floor(Math.random()*pool.length)]});
      }
      if(reward.biomeUnlock) G.unlockedBiomes.push(reward.biomeUnlock);
      if(reward.secretPet) obtainRandomPet('nullcat');
      G.currentBoss = null;
      addLog(`🏆 Defeated ${boss.name}!`);
      updateUI();
    }
  }, 100);
}

function obtainRandomPet(specific) {
  const pet = specific ? BASE_PETS.find(p=>p.id===specific) : BASE_PETS[Math.floor(Math.random()*BASE_PETS.length)];
  G.pets.push({...pet, level:1, exp:0});
  if(!G.activePet) G.activePet = G.pets[0];
  addLog(`🐾 Obtained ${pet.name}!`);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
function updateUI() {
  document.getElementById('hud-energy').innerText = Math.floor(G.energy);
  document.getElementById('hud-rolls').innerText = G.totalRolls;
  document.getElementById('hud-prestige').innerText = G.prestigeBonus.toFixed(2)+'x';
  document.getElementById('hud-sac').innerText = G.sacrifices;
  document.getElementById('hud-streak').innerText = G.streak;
  document.getElementById('hud-pet').innerText = G.activePet ? G.activePet.emoji+' '+G.activePet.name : 'None';
  document.getElementById('energy-val').innerText = Math.floor(G.energy)+' / '+G.rollCost;
  document.getElementById('aura-fill').style.width = Math.min(100, G.energy/G.rollCost*100)+'%';
  document.getElementById('cost-val').innerText = G.rollCost;
  document.getElementById('roll-btn').disabled = G.energy < G.rollCost;
  document.getElementById('sacrifice-meter').innerText = `Sacrifice Charge: ${G.sacrificeCharge.toFixed(0)}/100`;

  const eq = G.equippedAura;
  if(eq) {
    document.getElementById('orb-emoji').innerText = TIER_EMOJIS[eq.tier]||'🔮';
    document.getElementById('eq-name').innerText = TIER_EMOJIS[eq.tier]+' '+eq.name+' (T'+eq.tier+')';
    document.getElementById('eq-effect').innerText = 'Passive: '+eq.passive;
    document.getElementById('eq-abilities').innerText = 'Abilities: '+eq.abilities.map(a=>a.type).join(', ');
  } else {
    document.getElementById('orb-emoji').innerText = '🔮';
    document.getElementById('eq-name').innerText = 'None';
    document.getElementById('eq-effect').innerText = '';
    document.getElementById('eq-abilities').innerText = '';
  }

  // Inventory
  const invDiv = document.getElementById('inv-scroll');
  invDiv.innerHTML = '';
  G.inventory.forEach((a,i)=>{
    const d = document.createElement('div');
    d.className = 'inv-item' + (G.equippedAura && G.equippedAura.id===a.id ? ' equipped' : '');
    d.innerHTML = `<span class="iname">${TIER_EMOJIS[a.tier]} ${a.name} (T${a.tier})</span>`;
    d.onclick = ()=> { G.equippedAura = {...a}; applyAuraAbilities(); updateUI(); };
    invDiv.appendChild(d);
  });

  // Pet area
  const petArea = document.getElementById('pet-area');
  petArea.innerHTML = G.activePet ? `${G.activePet.emoji} ${G.activePet.name} Lv.${G.activePet.level}` : 'No pet';
  const petSelect = document.createElement('select');
  petSelect.style.background='#111'; petSelect.style.color='var(--text)'; petSelect.style.border='1px solid var(--border)'; petSelect.style.borderRadius='6px'; petSelect.style.padding='5px'; petSelect.style.width='100%'; petSelect.style.marginTop='5px';
  petSelect.innerHTML = '<option value="">-- Select Pet --</option>';
  G.pets.forEach((p,i)=>{ petSelect.innerHTML += `<option value="${i}" ${G.activePet&&G.activePet.id===p.id?'selected':''}>${p.emoji} ${p.name}</option>`; });
  petSelect.onchange = (e) => { if(e.target.value!=='') G.activePet = G.pets[parseInt(e.target.value)]; updateUI(); };
  petArea.appendChild(petSelect);

  // Boss area
  const bossArea = document.getElementById('boss-area');
  if(G.currentBoss) {
    bossArea.innerHTML = `${G.currentBoss.name} HP: ${Math.ceil(G.currentBoss.currentHp)}`;
  } else {
    bossArea.innerHTML = '';
    BOSS_LIST.forEach((b,i)=>{
      const btn = document.createElement('button');
      btn.className = 'mbtn gold';
      btn.style.margin = '2px';
      btn.innerText = `${b.name} (${b.hp} HP)`;
      btn.onclick = ()=> startBoss(i);
      bossArea.appendChild(btn);
    });
  }

  // Biomes
  const biomeSelect = document.getElementById('biome-select');
  biomeSelect.innerHTML = '';
  for(let key in BIOMES) {
    if(G.unlockedBiomes.includes(key)) {
      biomeSelect.innerHTML += `<option value="${key}" ${G.biome===key?'selected':''}>${BIOMES[key].emoji} ${BIOMES[key].name}</option>`;
    }
  }
  biomeSelect.onchange = (e) => { G.biome = e.target.value; updateBG(); };

  document.getElementById('genesis-btn').style.display = G.bestTier>=18 ? 'inline-block' : 'none';
}

// ═══════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════
let fxCtx, fxW, fxH, animT=0, bgCtx, bgW, bgH;
function initFX(){
  const c = document.getElementById('fx-canvas');
  fxCtx = c.getContext('2d');
  function resize(){ fxW=c.width=window.innerWidth; fxH=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
}
function initBG(){
  const c = document.getElementById('bg-canvas');
  bgCtx = c.getContext('2d');
  function resize(){ bgW=c.width=window.innerWidth; bgH=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  (function loop(t){
    bgCtx.clearRect(0,0,bgW,bgH);
    const biome = BIOMES[G.biome];
    bgCtx.fillStyle = biome.bg;
    bgCtx.fillRect(0,0,bgW,bgH);
    for(let i=0;i<30;i++){
      let x=(Math.sin(i*7.3+t*0.00025)*0.5+0.5)*bgW;
      let y=(Math.cos(i*5.1+t*0.0003)*0.5+0.5)*bgH;
      bgCtx.beginPath();bgCtx.arc(x,y,1,0,6.28);
      bgCtx.fillStyle='rgba(255,255,255,0.05)'; bgCtx.fill();
    }
    requestAnimationFrame(loop);
  })();
}
function renderFX(ts){
  animT=ts||0; fxCtx.clearRect(0,0,fxW,fxH);
  if(G.equippedAura){
    const fn = EFFECTS[G.equippedAura.effect];
    if(fn) fn(fxCtx,fxW,fxH,animT);
  }
  requestAnimationFrame(renderFX);
}

function showToast(msg){
  const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show');
  clearTimeout(window.toastTimeout); window.toastTimeout=setTimeout(()=>t.classList.remove('show'),2500);
}
function addLog(msg){
  const d=document.getElementById('log-box'); const el=document.createElement('div'); el.className='log-entry'; el.innerText=msg;
  d.appendChild(el); d.scrollTop=d.scrollHeight; if(d.children.length>40) d.removeChild(d.firstChild);
}

// Event listeners
document.getElementById('big-orb').addEventListener('click', e=>{
  const val = Math.floor(calculateDamage());
  G.energy += val; G.streak = Math.min(20, G.streak+1);
  document.getElementById('click-counter').innerText = Math.floor(G.energy);
  document.getElementById('click-rate').innerText = '+'+val+' / click';
  const p = document.createElement('div'); p.className='click-particle'; p.innerText='+'+val;
  p.style.left=e.clientX+'px'; p.style.top=e.clientY+'px'; p.style.color='#9b6eff';
  document.body.appendChild(p); setTimeout(()=>p.remove(),950);
  updateUI();
});

document.getElementById('roll-btn').addEventListener('click', ()=>{
  if(G.energy < G.rollCost) return;
  G.energy -= G.rollCost; G.totalRolls++; G.manualRolls++; G.streak=0;
  const aura = rollAura();
  G.currentRolled = aura;
  document.getElementById('result-panel').innerHTML = `
    <div class="t${aura.tier}">${TIER_EMOJIS[aura.tier]} ${aura.name}</div>
    <div style="color:var(--muted)">${TIER_NAMES[aura.tier]}</div>
    <button class="mbtn gold" onclick="addToInv()">Add</button>
    <button class="mbtn" onclick="equipNow()">Equip</button>
  `;
  if(aura.tier > G.bestTier){ G.bestTier=aura.tier; showToast('New best: '+aura.name+'!'); }
  if(aura.tier >= 6) playCutscene(aura.tier, aura.name);
  addLog(`Rolled: ${aura.name} (T${aura.tier})`);
  updateUI();
});

function addToInv() {
  if(!G.currentRolled) return;
  if(G.inventory.length >= 20) showToast('Inventory full!');
  else { G.inventory.push({...G.currentRolled}); updateUI(); }
}
function equipNow() {
  if(!G.currentRolled) return;
  if(!G.inventory.find(a=>a.id===G.currentRolled.id)) G.inventory.push({...G.currentRolled});
  G.equippedAura = {...G.currentRolled}; applyAuraAbilities(); updateUI();
}
window.addToInv = addToInv; window.equipNow = equipNow;

document.getElementById('equip-best').onclick = ()=>{
  if(!G.inventory.length) return;
  const best = G.inventory.reduce((a,b)=>a.tier>b.tier?a:b);
  G.equippedAura = {...best}; applyAuraAbilities(); updateUI();
};
document.getElementById('fusion-btn').onclick = ()=>{
  const groups={};
  G.inventory.forEach((a,i)=>{ groups[a.tier]=groups[a.tier]||[]; groups[a.tier].push(i); });
  for(let t=20; t>=1; t--){
    if(groups[t] && groups[t].length>=2){
      const [i1,i2]=[groups[t][0], groups[t][1]];
      const nt = Math.min(20, t+1);
      const pool = AURA_DB.filter(a=>a.tier===nt);
      if(!pool.length) continue;
      const fused = {...pool[Math.floor(Math.random()*pool.length)]};
      [i1,i2].sort((a,b)=>b-a).forEach(i=>G.inventory.splice(i,1));
      G.inventory.push(fused); G.stats.fusions=(G.stats.fusions||0)+1;
      addLog(`✨ Fusion! → ${fused.name} (T${fused.tier})`); updateUI(); return;
    }
  }
  showToast('Need 2 auras of same tier!');
};
document.getElementById('sacrifice-selected').onclick = ()=>{
  if(!G.inventory.length) return;
  const idx = prompt('Enter inventory index (0-'+(G.inventory.length-1)+') to sacrifice:');
  if(idx!==null && !isNaN(idx) && G.inventory[parseInt(idx)]) sacrificeAura(parseInt(idx));
};
document.getElementById('sort-btn').onclick = ()=>{ G.inventory.sort((a,b)=>b.tier-a.tier); updateUI(); };
document.getElementById('clear-inv').onclick = ()=>{ if(confirm('Clear inventory?')){ G.inventory=[]; G.equippedAura=null; updateUI(); } };
document.getElementById('prestige-btn').onclick = ()=>{
  if(G.totalRolls<500) return showToast('Need 500 rolls!');
  if(!confirm('Prestige?')) return;
  G.prestigeBonus+=0.25; G.clickPower=1; G.clickPowerMult=1.0; G.rollCost=100;
  G.upgrades={clickPower:0,rollCost:0,energyMult:0,luck:0,autoClick:0,autoRoll:0,autoFusion:0};
  G.inventory=[]; G.equippedAura=null; G.currentRolled=null;
  G.totalRolls=0; G.manualRolls=0; G.energy=0; G.streak=0; G.pityCounter=0; G.sacrifices=0; G.sacrificeLuck=0; G.sacrificeCharge=0;
  G.stats.prestigeCount=(G.stats.prestigeCount||0)+1;
  if(G.autoClickInterval){ clearInterval(G.autoClickInterval); G.autoClickInterval=null; }
  addLog('🌀 Prestige!'); updateUI(); buildShop();
};
document.getElementById('genesis-btn').onclick = ()=>{
  if(G.bestTier<18) return;
  if(!confirm('Genesis Reset? This resets everything except prestige bonus and unlocks a secret.')) return;
  G.prestigeBonus+=1; G.inventory=[]; G.equippedAura=null; G.bestTier=0;
  G.unlockedBiomes.push('infinite'); addLog('💠 Genesis Reset!'); updateUI();
};

function buildShop(){
  const d=document.getElementById('shop-list');
  d.innerHTML='';
  [{id:'clickPower',name:'Click Amplifier',cost:50,desc:'+2 energy/click',max:10},
   {id:'rollCost',name:'Efficient Roll',cost:100,desc:'-5 roll cost',max:8},
   {id:'energyMult',name:'Energy Surge',cost:200,desc:'+25% energy',max:6},
   {id:'luck',name:'Fortune Crystal',cost:300,desc:'+luck',max:5},
   {id:'autoClick',name:'Auto Clicker',cost:500,desc:'Auto-click',max:3},
   {id:'autoRoll',name:'Auto Roll',cost:1000,desc:'Auto roll when full',max:1},
   {id:'autoFusion',name:'Auto Fusion',cost:5000,desc:'Auto fuse',max:1}
  ].forEach(u=>{
    const lvl=G.upgrades[u.id]||0, maxed=lvl>=u.maxLevel, cost=Math.floor(u.cost*Math.pow(1.65,lvl));
    d.innerHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px;border-bottom:1px solid var(--border);">
      <div><b>${u.name}</b> Lv${lvl}/${u.maxLevel}<br><small>${u.desc}</small></div>
      <button class="mbtn gold" onclick="buyUpgrade('${u.id}')" ${maxed||G.energy<cost?'disabled':''}>${maxed?'MAX':cost+' ⚡'}</button>
    </div>`;
  });
}
window.buyUpgrade = (id)=>{
  const u = {clickPower:{cost:50,max:10},rollCost:{cost:100,max:8},energyMult:{cost:200,max:6},luck:{cost:300,max:5},autoClick:{cost:500,max:3},autoRoll:{cost:1000,max:1},autoFusion:{cost:5000,max:1}}[id];
  const lvl=G.upgrades[id]||0, cost=Math.floor(u.cost*Math.pow(1.65,lvl));
  if(G.energy>=cost && lvl<u.max){
    G.energy-=cost; G.upgrades[id]=lvl+1;
    if(id==='clickPower') G.clickPower+=2;
    if(id==='rollCost') G.rollCost=Math.max(20,G.rollCost-5);
    if(id==='energyMult') G.clickPowerMult+=0.25;
    if(id==='autoClick') setupAutoClick();
    if(id==='autoRoll') G.autoRollUnlocked=true;
    if(id==='autoFusion') G.autoFusionUnlocked=true;
    buildShop(); updateUI();
  }
};

function setupAutoClick(){
  if(G.autoClickInterval) clearInterval(G.autoClickInterval);
  if(G.upgrades.autoClick>0) G.autoClickInterval = setInterval(()=>{
    G.energy += Math.floor(calculateDamage()); G.streak=Math.min(20,G.streak+1); updateUI();
  }, 1500/G.upgrades.autoClick);
}

// Auto-roll loop
setInterval(()=>{
  if(G.autoRollUnlocked && G.energy>=G.rollCost) document.getElementById('roll-btn').click();
  if(G.autoFusionUnlocked) document.getElementById('fusion-btn').click();
}, 2000);

// Offline progress
window.addEventListener('load', ()=>{
  const now = Date.now();
  const elapsed = Math.floor((now - G.offlineTimestamp)/1000);
  if(elapsed > 10) {
    const earned = Math.floor(elapsed * 0.5);
    G.energy += earned;
    addLog(`⏰ Offline: +${earned} energy`);
  }
  G.offlineTimestamp = now;
});

initFX(); initBG(); requestAnimationFrame(renderFX); buildShop(); updateUI();
addLog('💎 AURA CLICKER RNG EXPANDED');
addLog('200 auras, pets, bosses, biomes, sacrifice, and more!');
</script>
