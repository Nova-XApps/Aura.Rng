<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURA.RNG | Mythic+ Cinematic Cutscenes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #03050b, #000000);
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            color: #eee;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        /* panels */
        .panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            flex: 1;
            min-width: 280px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            background: #0a0c1ad9;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
        }

        .blackhole-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 1rem auto;
            background: radial-gradient(circle at 30% 20%, #1a0b2e, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            border: 2px solid #6f3eff;
            box-shadow: 0 0 30px rgba(156, 0, 210, 0.6);
            transition: transform 0.05s;
        }
        .blackhole-btn:active { transform: scale(0.96); }

        .result-card {
            background: #0b0e1ae0;
            border-radius: 1.5rem;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 6px solid #883eff;
        }
        .rare-glow {
            box-shadow: 0 0 18px #ffbc3e;
            border-left-color: gold;
        }

        .inv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
            max-height: 320px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .card {
            background: #111;
            padding: 0.6rem;
            border-radius: 1rem;
            border: 1px solid #333;
        }
        .card.equipped { border: 2px solid gold; background: #1e1a2f; }

        .log {
            background: #01010880;
            border-radius: 1rem;
            padding: 0.5rem;
            height: 160px;
            overflow-y: auto;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        button {
            background: linear-gradient(135deg, #2a235a, #120e2c);
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            margin: 0.2rem;
            font-family: inherit;
            border: 1px solid #5f4bcb;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.97); }

        /* CUTSCENE OVERLAY (spectacular) */
        .cutscene-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .cutscene-active {
            opacity: 1;
            pointer-events: none;
        }
        .cutscene-content {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: white;
            z-index: 10001;
            text-transform: uppercase;
        }
        /* Tier-specific animations */
        .mythic-glow {
            text-shadow: 0 0 20px #8a2be2, 0 0 40px blueviolet;
            animation: mythicPulse 0.4s infinite alternate;
        }
        .divine-glow {
            text-shadow: 0 0 30px gold, 0 0 60px #ffd700;
            animation: divinePulse 0.3s infinite alternate;
        }
        .transcendent-glow {
            text-shadow: 0 0 20px cyan, 0 0 50px magenta, 0 0 80px white;
            animation: glitchText 0.08s infinite;
        }
        .screen-shake {
            animation: shakeScreen 0.06s infinite;
        }
        .glitch-overlay {
            animation: glitchBg 0.1s infinite;
            background: repeating-linear-gradient(0deg, rgba(255,0,255,0.2) 0px, rgba(0,255,255,0.2) 2px, transparent 2px, transparent 6px);
        }
        @keyframes mythicPulse {
            from { text-shadow: 0 0 20px #8a2be2; }
            to { text-shadow: 0 0 60px #ff00ff; }
        }
        @keyframes divinePulse {
            from { text-shadow: 0 0 30px gold; }
            to { text-shadow: 0 0 100px orange; }
        }
        @keyframes glitchText {
            0% { transform: skew(0deg); opacity:1; text-shadow: -3px 0 red, 3px 0 blue; }
            50% { transform: skew(5deg); text-shadow: 3px 0 cyan, -3px 0 magenta; }
            100% { transform: skew(0deg); text-shadow: 0 0 20px white; }
        }
        @keyframes shakeScreen {
            0% { transform: translate(2px, 1px); }
            100% { transform: translate(-2px, -1px); }
        }
        @keyframes glitchBg {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .global-chat {
            background: #01010880;
            border-radius: 1rem;
            padding: 0.5rem;
            height: 240px;
            overflow-y: auto;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        .global-announce {
            color: gold;
            text-shadow: 0 0 4px orange;
            font-weight: bold;
        }
        .health-bar {
            background: #6a0e0e;
            height: 10px;
            border-radius: 8px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .health-fill {
            background: #e04e4e;
            width: 100%;
            height: 100%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- ROLL PANEL -->
    <div class="panel">
        <div class="stats-bar">
            <span>🎲 Manual: <span id="manualCount">0</span></span>
            <span>🌀 Total: <span id="totalCount">0</span></span>
            <span>⭐ Auto: <span id="autoStatus">🔒 0/100</span></span>
        </div>
        <div class="blackhole-btn" id="rollBtn">🕳️</div>
        <div id="resultCard" class="result-card">
            <div><strong id="auraName">None</strong> <span id="auraTier">Tier ?</span></div>
            <div id="auraMoves">Moves: --</div>
            <div id="auraPassive">Passive: --</div>
            <div style="margin-top: 8px;">
                <button id="addBtn">📦 Add</button>
                <button id="equipCurrentBtn">⚡ Equip</button>
            </div>
        </div>
        <div>
            <label><input type="checkbox" id="autoToggle" disabled> 🤖 Auto-Roll</label>
            <span id="autoMsg" style="font-size:12px; margin-left:8px;"></span>
        </div>
        <div style="margin-top: 1rem; background:#01001580; border-radius:1rem; padding:0.6rem;">
            <div>✨ Equipped Aura</div>
            <div id="equippedDisplay">None</div>
        </div>
    </div>

    <!-- INVENTORY PANEL -->
    <div class="panel">
        <h2>🎒 Inventory</h2>
        <div id="inventoryGrid" class="inv-grid"></div>
        <button id="clearInvBtn">🗑️ Clear</button>
        <button id="equipBestBtn">🏆 Equip Best</button>
    </div>

    <!-- ARENA + GLOBAL CHAT -->
    <div class="panel">
        <h2>⚔️ Arena</h2>
        <div>
            <button id="easyBtn">Easy</button>
            <button id="mediumBtn">Medium</button>
            <button id="hardBtn">Hard</button>
            <button id="bossBtn">Boss</button>
        </div>
        <div id="enemyDisplay">Enemy: None</div>
        <div class="health-bar"><div id="enemyHealthFill" class="health-fill" style="width:0%"></div></div>
        <div id="combatLog" class="log"></div>
        <div id="abilityButtons" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>

        <h3 style="margin-top: 1rem;">🌍 Global Chat</h3>
        <div id="globalChat" class="global-chat"></div>
    </div>
</div>

<!-- CUTSCENE OVERLAY -->
<div id="cutsceneOverlay" class="cutscene-overlay">
    <div id="cutsceneText" class="cutscene-content">⚡ EVENT ⚡</div>
</div>

<script>
    // ======================== 1. ABILITY POOL (200 moves via template) ========================
    const ABILITY_POOL = {
        "Light Jab": { baseDamage: 15, cooldown: 0.8, type: "basic" },
        "Spark Tap": { baseDamage: 12, cooldown: 0.6, type: "basic" },
        "Quick Strike": { baseDamage: 18, cooldown: 0.9, type: "basic" },
        "Energy Flick": { baseDamage: 14, cooldown: 0.7, type: "basic" },
        "Basic Slash": { baseDamage: 16, cooldown: 0.8, type: "basic" },
        "Dash Step": { baseDamage: 10, cooldown: 1.2, type: "mobility" },
        "Blink": { baseDamage: 8, cooldown: 1.5, type: "mobility" },
        "Lightning Strike": { baseDamage: 28, cooldown: 1.5, type: "skill" },
        "Void Slash": { baseDamage: 30, cooldown: 1.6, type: "skill" },
        "Flame Burst": { baseDamage: 32, cooldown: 1.7, type: "skill" },
        "Ice Spike": { baseDamage: 26, cooldown: 1.4, type: "skill" },
        "Energy Wave": { baseDamage: 30, cooldown: 1.5, type: "skill" },
        "Meteor Crash": { baseDamage: 50, cooldown: 2.5, type: "heavy" },
        "Black Hole Hit": { baseDamage: 55, cooldown: 2.8, type: "heavy" },
        "Judgment Beam": { baseDamage: 60, cooldown: 3.0, type: "heavy" },
        "Reality Cut": { baseDamage: 90, cooldown: 4.0, type: "ultimate" },
        "Supernova": { baseDamage: 100, cooldown: 4.5, type: "ultimate" },
        "World End": { baseDamage: 120, cooldown: 5.0, type: "ultimate" },
        "Time Freeze": { baseDamage: 85, cooldown: 4.2, type: "ultimate" }
    };
    const ABILITY_NAMES = Object.keys(ABILITY_POOL);

    // ======================== 2. TIER MULTIPLIERS & ODDS ========================
    const TIER_MULT = {1:1.0,2:1.2,3:1.5,4:1.8,5:2.2,6:2.8,7:3.5,8:4.2,9:5.0,10:6.5};
    const RARITY_ODDS = {1:0.40,2:0.20,3:0.15,4:0.10,5:0.06,6:0.04,7:0.025,8:0.01,9:0.004,10:0.001};

    // ======================== 3. AURA DATABASE (100 auras) ========================
    let auraDatabase = [];
    function addAura(id, name, tier, abilityNames, passive = null) {
        let abilities = abilityNames.filter(an => ABILITY_POOL[an]).slice(0, tier >= 7 ? 3 : (tier >= 4 ? 2 : 1));
        if (abilities.length === 0) abilities = ["Light Jab"];
        auraDatabase.push({ id, name, tier, abilities, passive, multiplier: TIER_MULT[tier] });
    }
    // Generate 100 auras with distinct names
    const tier1Names = ["Faint Spark","Dust Aura","Weak Flow","Pale Mist","Basic Glow","Static Air","Soft Pulse","Low Spark","Dim Aura","Silent Glow"];
    for (let i=0;i<10;i++) addAura(i+1, tier1Names[i], 1, ["Light Jab"]);
    const tier2Names = ["Neon Flicker","Static Core","Flow Aura","Light Mist","Blue Spark","Warm Pulse","Stable Glow","Small Rift","Soft Voltage","Calm Spark"];
    for (let i=0;i<10;i++) addAura(11+i, tier2Names[i], 2, ["Spark Tap"]);
    const tier3Names = ["Storm Flicker","Void Spark","Ember Flow","Ice Pulse","Wind Spark","Gravity Flick","Plasma Tap","Rift Glow","Shock Core","Fire Mist"];
    for (let i=0;i<10;i++) addAura(21+i, tier3Names[i], 3, ["Quick Strike"]);
    // Tier 4-7
    for (let i=0;i<10;i++) addAura(31+i, `Rare Aura ${31+i}`, 4, ["Dash Step","Light Jab"]);
    for (let i=0;i<10;i++) addAura(41+i, `Elite Aura ${41+i}`, 5, ["Void Slash","Blink"]);
    for (let i=0;i<10;i++) addAura(51+i, `Epic Aura ${51+i}`, 6, ["Flame Burst","Energy Wave"]);
    for (let i=0;i<10;i++) addAura(61+i, `Legendary Aura ${61+i}`, 7, ["Meteor Crash","Dash Step","Light Jab"]);
    // Tier 8-10 (Mythic, Divine, Transcendent)
    const mythicNames = ["Celestial Rift","Void Emperor","Star God","Flame God","Ice God","Gravity God","Thunder Emperor","Wind God","Ember Emperor","Rift Emperor"];
    for (let i=0;i<10;i++) addAura(71+i, mythicNames[i], 8, ["Judgment Beam","Dash Step","Blink"], "Mythic: 10% lifesteal");
    const divineNames = ["Divine Light","Void Angel","Celestial King","Flame Archon","Ice Archon","Gravity Archon","Thunder Archon","Wind Archon","Ember Archon","Rift Archon"];
    for (let i=0;i<10;i++) addAura(81+i, divineNames[i], 9, ["Reality Cut","Time Freeze","Supernova"], "Divine: +25% damage");
    const transNames = ["Absolute Zero","Void Overlord","Star Destroyer","Flame Sovereign","Ice Sovereign","Gravity Sovereign","Thunder Sovereign","Wind Sovereign","Reality Breaker","Omniverse Aura"];
    for (let i=0;i<10;i++) addAura(91+i, transNames[i], 10, ["World End","Time Freeze","Black Hole Hit"], "Transcendent: Double damage on crit");

    // ======================== 4. GLOBAL STATE ========================
    let inventory = [];
    let equippedAura = null;
    let currentRolled = null;
    let manualRolls = 0, totalRolls = 0;
    let autoUnlocked = false, autoActive = false, autoInterval = null;
    let pityCounter = 0;
    let isCutscenePlaying = false;
    const MAX_INV = 30;

    // Combat state
    let enemyHP = 0, enemyMaxHP = 0, enemyBaseDmg = 15;
    let abilityCooldowns = new Map();
    let botCooldown = 0;

    // DOM elements
    const rollBtn = document.getElementById('rollBtn');
    const auraNameSpan = document.getElementById('auraName');
    const auraTierSpan = document.getElementById('auraTier');
    const auraMovesSpan = document.getElementById('auraMoves');
    const auraPassiveSpan = document.getElementById('auraPassive');
    const resultCardDiv = document.getElementById('resultCard');
    const manualSpan = document.getElementById('manualCount');
    const totalSpan = document.getElementById('totalCount');
    const autoStatusSpan = document.getElementById('autoStatus');
    const autoToggle = document.getElementById('autoToggle');
    const autoMsgSpan = document.getElementById('autoMsg');
    const invGrid = document.getElementById('inventoryGrid');
    const equippedDisplaySpan = document.getElementById('equippedDisplay');
    const enemyDisplay = document.getElementById('enemyDisplay');
    const enemyHealthFill = document.getElementById('enemyHealthFill');
    const combatLogDiv = document.getElementById('combatLog');
    const abilityBtnsDiv = document.getElementById('abilityButtons');
    const globalChatDiv = document.getElementById('globalChat');

    // Cutscene overlay
    const cutsceneOverlay = document.getElementById('cutsceneOverlay');
    const cutsceneTextElem = document.getElementById('cutsceneText');

    // Helper: global message
    function addGlobalMessage(msg, isRare = false) {
        const div = document.createElement('div');
        div.innerHTML = isRare ? `<span class="global-announce">🌍 ${msg}</span>` : `💬 ${msg}`;
        globalChatDiv.appendChild(div);
        globalChatDiv.scrollTop = globalChatDiv.scrollHeight;
        if (globalChatDiv.children.length > 40) globalChatDiv.removeChild(globalChatDiv.firstChild);
    }

    function addCombatLog(msg) {
        const div = document.createElement('div');
        div.textContent = msg;
        combatLogDiv.appendChild(div);
        combatLogDiv.scrollTop = combatLogDiv.scrollHeight;
        if (combatLogDiv.children.length > 30) combatLogDiv.removeChild(combatLogDiv.firstChild);
    }

    // ======================== SPECTACULAR CUTSCENES ========================
    function playCutscene(tier, auraName) {
        return new Promise((resolve) => {
            if (isCutscenePlaying) { resolve(); return; }
            isCutscenePlaying = true;
            let duration = 0, theme = "", colorClass = "";
            if (tier === 8) {
                duration = 3200;
                theme = "🌀 MYTHIC SURGE 🌀";
                colorClass = "mythic-glow";
                cutsceneTextElem.className = `cutscene-content ${colorClass}`;
                cutsceneOverlay.classList.add('cutscene-active');
                // Purple vortex effect
                let step = 0;
                const interval = setInterval(() => {
                    const texts = ["💜 PURPLE VORTEX", "⚡ COSMIC ENERGY", "🌟 MYTHIC REVEAL"];
                    cutsceneTextElem.innerHTML = texts[step % 3];
                    step++;
                }, 800);
                setTimeout(() => {
                    clearInterval(interval);
                    cutsceneOverlay.classList.remove('cutscene-active');
                    isCutscenePlaying = false;
                    addGlobalMessage(`✨ ${auraName} (TIER ${tier} MYTHIC) materialized! ✨`, true);
                    resolve();
                }, duration);
            } else if (tier === 9) {
                duration = 4500;
                theme = "✨ DIVINE JUDGMENT ✨";
                colorClass = "divine-glow";
                cutsceneTextElem.className = `cutscene-content ${colorClass}`;
                cutsceneOverlay.classList.add('cutscene-active');
                let step = 0;
                const interval = setInterval(() => {
                    const texts = ["🌅 HEAVENLY LIGHT", "✨ GOLDEN DESCENT", "⏳ MOMENT OF TRUTH", "💥 DIVINE EXPLOSION"];
                    cutsceneTextElem.innerHTML = texts[step % 4];
                    step++;
                }, 1000);
                setTimeout(() => {
                    clearInterval(interval);
                    cutsceneOverlay.classList.remove('cutscene-active');
                    isCutscenePlaying = false;
                    addGlobalMessage(`⭐ ${auraName} (TIER ${tier} DIVINE) has arrived! ⭐`, true);
                    resolve();
                }, duration);
            } else if (tier === 10) {
                duration = 6000;
                theme = "🌀 REALITY BREAK 🌀";
                colorClass = "transcendent-glow";
                cutsceneTextElem.className = `cutscene-content ${colorClass}`;
                cutsceneOverlay.classList.add('cutscene-active');
                document.body.classList.add('screen-shake');
                cutsceneOverlay.classList.add('glitch-overlay');
                let step = 0;
                const interval = setInterval(() => {
                    const texts = ["🕳️ BLACK HOLE COLLAPSE", "💔 REALITY FRACTURE", "🌀 GLITCH OVERDRIVE", "🌌 WORLD BREAK", "⚫ TRANSCENDENT AWAKENING"];
                    cutsceneTextElem.innerHTML = texts[step % 5];
                    step++;
                }, 1000);
                setTimeout(() => {
                    clearInterval(interval);
                    cutsceneOverlay.classList.remove('cutscene-active');
                    document.body.classList.remove('screen-shake');
                    cutsceneOverlay.classList.remove('glitch-overlay');
                    isCutscenePlaying = false;
                    addGlobalMessage(`🌠 ${auraName} (TIER ${tier} TRANSCENDENT) shattered reality! 🌠`, true);
                    resolve();
                }, duration);
            } else {
                resolve();
            }
        });
    }

    // ======================== ROLL SYSTEM ========================
    function rollAura() {
        let rand = Math.random();
        let acc = 0;
        let selectedTier = 1;
        for (let t = 1; t <= 10; t++) {
            acc += RARITY_ODDS[t];
            if (rand <= acc) { selectedTier = t; break; }
        }
        // Pity: after 80 rolls no tier>=7, force tier7
        if (pityCounter >= 80 && selectedTier < 7) {
            selectedTier = 7;
            pityCounter = 0;
        } else if (selectedTier >= 7) {
            pityCounter = 0;
        } else {
            pityCounter++;
        }
        const pool = auraDatabase.filter(a => a.tier === selectedTier);
        if (pool.length === 0) return structuredClone(auraDatabase[0]);
        return structuredClone(pool[Math.floor(Math.random() * pool.length)]);
    }

    async function performRoll(isManual = true) {
        if (isCutscenePlaying) {
            addGlobalMessage("Cutscene in progress, wait a moment...");
            return;
        }
        const newAura = rollAura();
        currentRolled = newAura;
        totalRolls++;
        if (isManual) manualRolls++;
        updateStatsUI();

        // Update display (placeholder until cutscene finishes)
        auraNameSpan.innerText = newAura.name;
        auraTierSpan.innerText = `Tier ${newAura.tier}`;
        auraMovesSpan.innerText = `Moves: ${newAura.abilities.join(', ')}`;
        auraPassiveSpan.innerText = `Passive: ${newAura.passive || 'None'}`;
        if (newAura.tier >= 6) resultCardDiv.classList.add('rare-glow');
        else resultCardDiv.classList.remove('rare-glow');

        if (newAura.tier >= 8) {
            await playCutscene(newAura.tier, newAura.name);
        }
        // after cutscene, ensure display is final
        updateStatsUI();
        if (!autoUnlocked && manualRolls >= 100) {
            autoUnlocked = true;
            autoToggle.disabled = false;
            autoMsgSpan.innerText = "✅ Auto unlocked!";
            addGlobalMessage("🎉 Auto-Roll unlocked after 100 manual rolls!");
        }
        saveGame();
    }

    function updateStatsUI() {
        manualSpan.innerText = manualRolls;
        totalSpan.innerText = totalRolls;
        autoStatusSpan.innerText = autoUnlocked ? "✅ UNLOCKED" : `🔒 ${manualRolls}/100`;
        if (autoUnlocked) autoToggle.disabled = false;
    }

    // ======================== INVENTORY & EQUIP ========================
    function renderInventory() {
        invGrid.innerHTML = '';
        if (inventory.length === 0) {
            invGrid.innerHTML = '<div style="text-align:center;">🌀 No auras yet</div>';
            return;
        }
        inventory.forEach((aura, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            if (equippedAura && equippedAura.id === aura.id) card.classList.add('equipped');
            card.innerHTML = `
                <strong>${aura.name}</strong><br>
                T${aura.tier} (${aura.multiplier}x)<br>
                <button class="equipInvBtn" data-idx="${idx}">⚡ Equip</button>
                <button class="removeInvBtn" data-idx="${idx}">🗑️</button>
            `;
            invGrid.appendChild(card);
        });
        document.querySelectorAll('.equipInvBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && inventory[idx]) equipAura(structuredClone(inventory[idx]));
            });
        });
        document.querySelectorAll('.removeInvBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && inventory[idx]) {
                    if (equippedAura && equippedAura.id === inventory[idx].id) equippedAura = null;
                    inventory.splice(idx, 1);
                    renderInventory();
                    updateEquippedDisplay();
                    saveGame();
                    if (autoActive && inventory.length >= MAX_INV) stopAutoDueToFull();
                }
            });
        });
    }

    function equipAura(aura) {
        equippedAura = structuredClone(aura);
        abilityCooldowns.clear();
        updateEquippedDisplay();
        renderInventory();
        updateAbilityButtons();
        saveGame();
        addCombatLog(`⚡ Equipped ${aura.name} (Tier ${aura.tier})`);
    }

    function updateEquippedDisplay() {
        if (!equippedAura) {
            equippedDisplaySpan.innerHTML = "None";
            return;
        }
        equippedDisplaySpan.innerHTML = `<strong>${equippedAura.name}</strong> [T${equippedAura.tier}] ${equippedAura.multiplier}x<br>${equippedAura.abilities.join(', ')}`;
    }

    function addCurrentToInventory() {
        if (!currentRolled) return;
        if (inventory.length >= MAX_INV) { addGlobalMessage("Inventory full! Remove some auras."); return; }
        inventory.push(structuredClone(currentRolled));
        renderInventory();
        saveGame();
    }

    function equipCurrent() { if (currentRolled) equipAura(structuredClone(currentRolled)); }
    function clearInventory() { inventory = []; if (equippedAura) equippedAura = null; renderInventory(); updateEquippedDisplay(); saveGame(); if (autoActive && inventory.length >= MAX_INV) stopAutoDueToFull(); addGlobalMessage("Inventory cleared."); }
    function equipBestTier() { if (inventory.length === 0) return; let best = inventory.reduce((a,b) => a.tier > b.tier ? a : b); equipAura(structuredClone(best)); }

    // ======================== AUTO ROLL ========================
    function startAutoRoll() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(async () => {
            if (!autoActive || isCutscenePlaying) return;
            if (inventory.length >= MAX_INV) { stopAutoDueToFull(); return; }
            const newAura = rollAura();
            currentRolled = newAura;
            totalRolls++;
            updateStatsUI();
            auraNameSpan.innerText = newAura.name;
            auraTierSpan.innerText = `Tier ${newAura.tier}`;
            auraMovesSpan.innerText = `Moves: ${newAura.abilities.join(', ')}`;
            auraPassiveSpan.innerText = `Passive: ${newAura.passive || 'None'}`;
            if (newAura.tier >= 6) resultCardDiv.classList.add('rare-glow'); else resultCardDiv.classList.remove('rare-glow');
            if (newAura.tier >= 8) await playCutscene(newAura.tier, newAura.name);
            if (inventory.length < MAX_INV) inventory.push(structuredClone(newAura));
            renderInventory();
            saveGame();
        }, 1600);
    }
    function stopAutoDueToFull() { if (autoActive) { autoActive = false; autoToggle.checked = false; if (autoInterval) clearInterval(autoInterval); autoInterval = null; autoMsgSpan.innerText = "Inventory full - stopped"; addGlobalMessage("Auto-roll stopped: inventory full."); } }
    function toggleAuto(e) { if (!autoUnlocked) { autoToggle.checked = false; return; } if (e.target.checked) { if (inventory.length >= MAX_INV) { alert("Full inventory"); autoToggle.checked = false; return; } autoActive = true; startAutoRoll(); autoMsgSpan.innerText = "🌀 AUTO active"; addGlobalMessage("Auto-roll engaged."); } else { autoActive = false; if (autoInterval) clearInterval(autoInterval); autoInterval = null; autoMsgSpan.innerText = "Auto paused"; } }

    // ======================== ARENA COMBAT ========================
    function spawnEnemy(hp, dmg, name) {
        enemyHP = hp;
        enemyMaxHP = hp;
        enemyBaseDmg = dmg;
        enemyDisplay.innerText = `Enemy: ${name} (${hp} HP)`;
        updateEnemyHealthBar();
        addCombatLog(`⚔️ ${name} appears!`);
    }
    function updateEnemyHealthBar() { let percent = (enemyHP / enemyMaxHP) * 100; enemyHealthFill.style.width = `${Math.max(0, percent)}%`; }
    function useAbility(abName) {
        if (!equippedAura) { addCombatLog("No aura equipped!"); return; }
        if (enemyHP <= 0) { addCombatLog("No enemy or already defeated. Spawn one."); return; }
        const ab = ABILITY_POOL[abName];
        if (!ab) return;
        let cd = abilityCooldowns.get(abName) || 0;
        if (cd > 0) { addCombatLog(`${abName} on cooldown (${cd.toFixed(1)}s)`); return; }
        let damage = Math.floor(ab.baseDamage * equippedAura.multiplier);
        enemyHP = Math.max(0, enemyHP - damage);
        addCombatLog(`✨ ${abName} deals ${damage} damage!`);
        updateEnemyHealthBar();
        abilityCooldowns.set(abName, ab.cooldown);
        startCooldownTimer();
        if (enemyHP <= 0) {
            addCombatLog(`🏆 Victory! Enemy defeated.`);
            enemyDisplay.innerText = "Enemy: Defeated";
            return;
        }
        // enemy counterattack
        setTimeout(() => {
            if (enemyHP > 0) {
                let enemyDmg = Math.floor(enemyBaseDmg + Math.random() * 15);
                addCombatLog(`🤖 Enemy attacks for ${enemyDmg} damage! (Player has no HP, but you feel the hit)`);
            }
        }, 500);
    }
    function startCooldownTimer() {
        const interval = setInterval(() => {
            let any = false;
            for (let [name, cd] of abilityCooldowns.entries()) {
                if (cd > 0) { abilityCooldowns.set(name, cd - 0.1); any = true; }
                else if (cd < 0) abilityCooldowns.set(name, 0);
            }
            if (!any) { clearInterval(interval); updateAbilityButtons(); return; }
            updateAbilityButtons();
        }, 100);
    }
    function updateAbilityButtons() {
        abilityBtnsDiv.innerHTML = '';
        if (!equippedAura) return;
        for (let abName of equippedAura.abilities) {
            const ab = ABILITY_POOL[abName];
            if (!ab) continue;
            const btn = document.createElement('button');
            btn.textContent = `${abName} (${ab.baseDamage} base)`;
            const cd = abilityCooldowns.get(abName) || 0;
            if (cd > 0) { btn.style.opacity = '0.6'; btn.disabled = true; btn.textContent += ` [${cd.toFixed(1)}s]`; }
            btn.onclick = () => useAbility(abName);
            abilityBtnsDiv.appendChild(btn);
        }
    }

    // ======================== SAVE/LOAD ========================
    function saveGame() {
        const save = {
            inventoryIds: inventory.map(a => a.id),
            equippedId: equippedAura?.id || null,
            manualRolls, totalRolls, autoUnlocked, pityCounter
        };
        localStorage.setItem("AuraRngSaveV4", JSON.stringify(save));
    }
    function loadGame() {
        const raw = localStorage.getItem("AuraRngSaveV4");
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            manualRolls = data.manualRolls || 0;
            totalRolls = data.totalRolls || 0;
            autoUnlocked = data.autoUnlocked || false;
            pityCounter = data.pityCounter || 0;
            if (data.inventoryIds) {
                inventory = [];
                for (let id of data.inventoryIds) {
                    const found = auraDatabase.find(a => a.id === id);
                    if (found) inventory.push(structuredClone(found));
                }
            }
            if (data.equippedId) {
                const eq = auraDatabase.find(a => a.id === data.equippedId);
                if (eq) equippedAura = structuredClone(eq);
                else equippedAura = null;
            }
            renderInventory();
            updateEquippedDisplay();
            updateStatsUI();
            if (autoUnlocked) autoToggle.disabled = false;
            else autoToggle.disabled = true;
        } catch (e) { console.warn(e); }
    }

    // ======================== EVENT LISTENERS ========================
    rollBtn.addEventListener('click', () => performRoll(true));
    document.getElementById('addBtn').addEventListener('click', addCurrentToInventory);
    document.getElementById('equipCurrentBtn').addEventListener('click', equipCurrent);
    document.getElementById('clearInvBtn').addEventListener('click', clearInventory);
    document.getElementById('equipBestBtn').addEventListener('click', equipBestTier);
    autoToggle.addEventListener('change', toggleAuto);
    document.getElementById('easyBtn').onclick = () => spawnEnemy(180, 18, "Easy Grunt");
    document.getElementById('mediumBtn').onclick = () => spawnEnemy(320, 28, "Medium Warrior");
    document.getElementById('hardBtn').onclick = () => spawnEnemy(550, 40, "Hard Berserker");
    document.getElementById('bossBtn').onclick = () => spawnEnemy(1000, 55, "Boss Titan");

    // Initialization
    loadGame();
    if (!currentRolled && auraDatabase[0]) currentRolled = structuredClone(auraDatabase[0]);
    if (currentRolled) {
        auraNameSpan.innerText = currentRolled.name;
        auraTierSpan.innerText = `Tier ${currentRolled.tier}`;
        auraMovesSpan.innerText = `Moves: ${currentRolled.abilities.join(', ')}`;
        auraPassiveSpan.innerText = `Passive: ${currentRolled.passive || 'None'}`;
    }
    spawnEnemy(180, 18, "Easy Grunt");
    addGlobalMessage("🌀 AURA.RNG with CINEMATIC CUTSCENES is ready! Roll the black hole! 🌌");
</script>
</body>
</html>
